<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}HostelNode CRM{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          panel: '#111b21',
          panel2: '#202c33',
          panel3: '#2a3942',
          accent: '#00a884',
          accent2: '#25d366',
          bubbleOut: '#005c4b',
          bubbleIn: '#202c33',
          bg: '#0b141a',
        },
        boxShadow: {
          glow: '0 0 25px rgba(0,168,132,0.25)',
        },
      },
    },
  }
</script>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>

<style>
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #374752; }

  .glass {
    background: rgba(32, 44, 51, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .fade-in { animation: fadeIn .25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }

  .htmx-indicator { opacity: 0; transition: opacity .15s ease; }
  .htmx-request .htmx-indicator { opacity: 1; }
  .htmx-request.htmx-indicator { opacity: 1; }

  [x-cloak] { display: none !important; }

  .typing-dot { animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0);} 30% { transform: translateY(-4px);} }
</style>
{% block head %}{% endblock %}
</head>
<body class="bg-bg text-gray-100 antialiased h-screen overflow-hidden font-[Segoe_UI,Helvetica,Arial,sans-serif]">

<div class="flex h-screen w-screen">
  {% include "layout/sidebar.html" %}

  <div class="flex-1 flex flex-col min-w-0">
    {% include "layout/navbar.html" %}
    <main class="flex-1 min-h-0 overflow-hidden">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

<script src="/static/js/websocket.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
