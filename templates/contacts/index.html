{% extends "base.html" %}
{% block content %}
<div class="h-full overflow-y-auto p-6 space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
    <div class="relative w-full sm:w-80">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
      </svg>
      <input type="text" name="search" placeholder="Search contacts"
             hx-get="/contacts/table" hx-target="#contacts-table" hx-trigger="keyup changed delay:300ms" hx-include="[name='tag']"
             class="w-full bg-panel3/60 rounded-xl pl-9 pr-3 py-2 text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent/50">
    </div>
    <div class="flex gap-2 flex-wrap">
      <button hx-get="/contacts/table" hx-target="#contacts-table" hx-vals='{"tag": ""}' hx-include="[name='search']"
              class="px-3 py-1.5 rounded-full text-xs font-medium {% if not active_tag %}bg-accent text-white{% else %}bg-panel3/60 text-gray-400{% endif %}">
        All
      </button>
      {% for tag in tags %}
      <button hx-get="/contacts/table" hx-target="#contacts-table" hx-vals='{"tag": "{{ tag }}"}' hx-include="[name='search']"
              class="px-3 py-1.5 rounded-full text-xs font-medium {% if active_tag == tag %}bg-accent text-white{% else %}bg-panel3/60 text-gray-400{% endif %}">
        {{ tag }}
      </button>
      {% endfor %}
    </div>
  </div>

  <div id="contacts-table" class="glass rounded-2xl border border-panel3/60 overflow-hidden">
    {% include "contacts/table.html" %}
  </div>
</div>
{% endblock %}
